name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'config/**'
      - 'skills/**'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Validate config
        run: python3 -c "import json; json.load(open('config/openclaw.json'))"

      - name: Sync skills
        run: rsync -avz skills/ /opt/openclaw/data/skills/

      - name: Sync config
        run: |
          cp config/openclaw.json /opt/openclaw/data/config.json
          cp config/SOUL.md /opt/openclaw/data/SOUL.md || true
          cp config/HEARTBEAT.md /opt/openclaw/data/HEARTBEAT.md || true

      - name: Pull and restart container
        run: |
          docker compose -f $GITHUB_WORKSPACE/docker/docker-compose.yml --env-file /opt/openclaw/.env pull
          docker rm -f openclaw watchtower 2>/dev/null || true
          docker compose -p openclaw -f $GITHUB_WORKSPACE/docker/docker-compose.yml --env-file /opt/openclaw/.env up -d

      - name: Health check
        run: |
          sleep 30
          wget -qO- http://localhost:18789/health | grep -q '"status":"ok"'
          echo "Health check passed"
